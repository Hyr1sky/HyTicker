name: "Release HyTicker"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    
    # Force the runner to use Node.js 24 for all Javascript actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Upgraded to v5 to match Node 24 environment
      - name: Checkout repository
        uses: actions/checkout@v5

      # Upgraded to v5 for better Node 24 compatibility
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24 # Use the latest LTS Node version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "HyTicker v__VERSION__"
          releaseBody: "Automated release for HyTicker (Node 24 Optimized)."
          releaseDraft: true
          prerelease: false